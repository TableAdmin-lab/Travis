name: Build WBR

on:
  workflow_dispatch:
    inputs:
      week_id:
        description: "Reporting week, for example 2026-06-08"
        required: true
        type: string

jobs:
  build-wbr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pillow

      - name: Show received report files
        run: |
          echo "Reporting week: ${{ inputs.week_id }}"
          echo "Expected report directory:"
          echo "data/incoming/${{ inputs.week_id }}"
          echo ""
          echo "Files in report directory:"
          find "data/incoming/${{ inputs.week_id }}" -maxdepth 1 -type f | sort

      - name: Validate required reports exist
        run: |
          REPORT_DIR="data/incoming/${{ inputs.week_id }}"

          test -d "$REPORT_DIR"

          ls "$REPORT_DIR"/*first-line-inbound-weekly*.csv
          ls "$REPORT_DIR"/*first-line-inbound-8-week*.csv
          ls "$REPORT_DIR"/*first-line-outbound-8-week*.csv
          ls "$REPORT_DIR"/*first-line-chats*.csv

      - name: Run WBR builder
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}

          REPORTING_WEEK: ${{ inputs.week_id }}
          NEW_WBR_TITLE: WBR - ${{ inputs.week_id }}

          WBR_AUTOMATION_MODE: full
          TEMPLATE_ITEM_TITLE: WBR Template

          CSV_DIR: data/incoming/${{ inputs.week_id }}

          TARGET_HEADING: "17.7 First Line Support"
          TARGET_INBOUND_WEEKLY_ANCHOR_TEXT: "New Daily 1 Week View"
          TARGET_INBOUND_8_WEEK_ANCHOR_TEXT: "Inbound"
          TARGET_OUTBOUND_8_WEEK_ANCHOR_TEXT: "Outbound"
          TARGET_CHATS_ANCHOR_TEXT: "Chats"

        run: |
          python Build_WBR.py
