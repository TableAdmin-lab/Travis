name: Build WBR

on:
  workflow_dispatch:
    inputs:
      week_id:
        description: "Reporting week, for example 2026-06-08"
        required: true
        type: string

jobs:
  build-wbr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pillow

      - name: Show received report files
        run: |
          echo "Reporting week: ${{ inputs.week_id }}"
          echo "Repo files:"
          find . -maxdepth 4 -type f | sort

      - name: Run WBR builder
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}

          REPORTING_WEEK: ${{ inputs.week_id }}
          NEW_WBR_TITLE: WBR - ${{ inputs.week_id }}

          WBR_AUTOMATION_MODE: full

          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TEMPLATE_ITEM_TITLE: WBR Template

          CSV_DIR: reports/${{ inputs.week_id }}

          CSV_INBOUND_WEEKLY_PATH: reports/${{ inputs.week_id }}/first-line-inbound-weekly.csv
          CSV_INBOUND_8_WEEK_PATH: reports/${{ inputs.week_id }}/first-line-inbound-8-week.csv
          CSV_OUTBOUND_8_WEEK_PATH: reports/${{ inputs.week_id }}/first-line-outbound-8-week.csv

        run: |
          python Build_WBR.py
